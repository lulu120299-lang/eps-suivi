<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>EPS — Carnet de suivi</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&family=DM+Serif+Display&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ===== GLOBAL ===== */
*{box-sizing:border-box;margin:0;padding:0;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-thumb{background:#2a2f42;border-radius:99px;}
body{font-family:'DM Sans',sans-serif;background:#f0ece3;color:#1a1810;}
button{cursor:pointer;transition:all .15s;}
/* ===== ACCUEIL ===== */
#pg-acc{min-height:100vh;}
.acc-header{padding:1.75rem 2.5rem 1.5rem;display:flex;align-items:flex-end;justify-content:space-between;border-bottom:2.5px solid #1a1810;background:#f0ece3;}
.acc-eyebrow{font-family:'JetBrains Mono',monospace;font-size:.65rem;text-transform:uppercase;letter-spacing:.2em;color:#7a7060;margin-bottom:3px;}
.acc-title{font-family:'Instrument Serif',serif;font-size:2.2rem;line-height:1;}
.acc-title em{font-style:italic;color:#c8400a;}
.acc-meta{font-family:'JetBrains Mono',monospace;font-size:.68rem;color:#7a7060;text-align:right;line-height:1.8;}
.acc-main{max-width:1060px;margin:0 auto;padding:2rem 2rem 4rem;}
.acc-steps{display:flex;align-items:center;margin-bottom:2.5rem;}
.acc-step{display:flex;align-items:center;gap:9px;font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#9a9080;}
.acc-step.active{color:#1a1810;}.acc-step.done{color:#1a6b3a;}
.acc-step-num{width:26px;height:26px;border-radius:50%;border:2px solid currentColor;display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:.72rem;}
.acc-step.active .acc-step-num{background:#1a1810;color:#f0ece3;border-color:#1a1810;}
.acc-step.done .acc-step-num{background:#1a6b3a;color:#fff;border-color:#1a6b3a;}
.acc-step-line{height:2px;width:36px;background:#d8d4cc;margin:0 8px;}
.acc-sec-tag{font-family:'JetBrains Mono',monospace;font-size:.65rem;text-transform:uppercase;letter-spacing:.15em;color:#7a7060;margin-bottom:5px;}
.acc-sec-title{font-family:'Instrument Serif',serif;font-size:1.6rem;margin-bottom:1.25rem;}
.acc-cls-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:2.5rem;}
.acc-cls{background:#faf7f0;border:2px solid #ddd8ce;border-radius:6px;padding:1.1rem .9rem;cursor:pointer;transition:all .15s;box-shadow:0 2px 0 #bdb8ae;position:relative;overflow:hidden;text-align:center;}
.acc-cls::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:var(--c);transform:scaleX(0);transition:transform .2s;}
.acc-cls:hover{border-color:var(--c);transform:translateY(-2px);}.acc-cls:hover::before,.acc-cls.sel::before{transform:scaleX(1);}
.acc-cls.sel{border-color:var(--c);background:var(--cl);}
.acc-cls-lv{font-family:'JetBrains Mono',monospace;font-size:.6rem;text-transform:uppercase;letter-spacing:.1em;color:#7a7060;margin-bottom:3px;}
.acc-cls-name{font-family:'Instrument Serif',serif;font-size:1.3rem;line-height:1.1;}
.acc-cls-sub{font-size:.68rem;color:#7a7060;margin-top:5px;font-weight:600;}
.acc-cls-dot{width:9px;height:9px;border-radius:50%;background:var(--c);margin:7px auto 0;opacity:0;transition:opacity .2s;}
.acc-cls.sel .acc-cls-dot{opacity:1;}
.acc-apsa-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1rem;}
.acc-apsa{background:#faf7f0;border:2px solid #ddd8ce;border-radius:6px;padding:.9rem 1rem;cursor:pointer;transition:all .15s;box-shadow:0 2px 0 #bdb8ae;display:flex;align-items:center;gap:11px;}
.acc-apsa:hover{border-color:#1a1810;transform:translateY(-1px);}.acc-apsa.sel{border-color:#1a1810;background:#1a18100a;}
.acc-apsa-emoji{font-size:1.5rem;width:38px;height:38px;display:flex;align-items:center;justify-content:center;background:#f0ece3;border-radius:7px;border:1px solid #ddd8ce;flex-shrink:0;}
.acc-apsa-ca{font-family:'JetBrains Mono',monospace;font-size:.58rem;text-transform:uppercase;letter-spacing:.1em;margin-bottom:2px;font-weight:700;}
.acc-apsa-name{font-weight:700;font-size:.85rem;line-height:1.2;}
.acc-custom{display:flex;gap:8px;align-items:center;margin-bottom:2rem;}
.acc-custom span{font-size:.78rem;color:#7a7060;font-weight:700;white-space:nowrap;}
.acc-custom input{flex:1;background:#faf7f0;border:2px solid #ddd8ce;border-radius:6px;padding:9px 12px;font-family:'Syne',sans-serif;font-size:.85rem;color:#1a1810;outline:none;box-shadow:0 2px 0 #bdb8ae;}
.acc-custom input:focus{border-color:#1a1810;}
.acc-divider{border:none;border-top:1.5px dashed #d0ccc4;margin:1.75rem 0;}
.acc-cta{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem;}
.acc-sum-lbl{font-family:'JetBrains Mono',monospace;font-size:.65rem;text-transform:uppercase;letter-spacing:.12em;color:#7a7060;margin-bottom:4px;}
.acc-sum-val{font-family:'Instrument Serif',serif;font-size:1.3rem;line-height:1.1;}
.acc-btn{background:#1a1810;color:#f0ece3;border:none;border-radius:5px;padding:15px 36px;font-family:'Syne',sans-serif;font-size:.95rem;font-weight:800;text-transform:uppercase;letter-spacing:.08em;cursor:pointer;transition:all .15s;box-shadow:0 3px 0 #555;position:relative;top:0;}
.acc-btn:hover:not(:disabled){top:2px;box-shadow:0 1px 0 #555;}.acc-btn:disabled{background:#d8d4cc;color:#9a9080;cursor:not-allowed;box-shadow:none;}
.acc-recent{margin-top:2.5rem;padding-top:2rem;border-top:2px solid #d8d4cc;}
.acc-recent-title{font-family:'JetBrains Mono',monospace;font-size:.65rem;text-transform:uppercase;letter-spacing:.15em;color:#7a7060;margin-bottom:.9rem;}
.acc-chips{display:flex;flex-wrap:wrap;gap:8px;}
.acc-chip{display:flex;align-items:center;gap:8px;background:#faf7f0;border:2px solid #ddd8ce;border-radius:5px;padding:7px 12px;font-size:.8rem;font-weight:600;cursor:pointer;transition:all .15s;box-shadow:0 2px 0 #bdb8ae;}
.acc-chip:hover{border-color:#1a1810;}
.acc-chip .dot{width:7px;height:7px;border-radius:50%;}
.acc-chip .x{color:#9a9080;margin-left:4px;opacity:.4;cursor:pointer;font-size:1rem;}
.acc-chip .x:hover{opacity:1;color:#c8400a;}

/* ===== SUIVI ===== */
#pg-suivi{background:#0d1018;color:#e4e6ef;min-height:100vh;display:none;}
.s-header{background:#13161f;border-bottom:1px solid #252836;padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;height:60px;position:sticky;top:0;z-index:100;gap:1rem;}
.s-logo{font-family:'DM Serif Display',serif;font-size:1.1rem;display:flex;align-items:center;gap:9px;}
.s-badge{background:#4f8aff;color:#fff;font-family:'DM Mono',monospace;font-size:.6rem;padding:2px 7px;border-radius:4px;letter-spacing:.05em;}
.s-ctx{font-family:'DM Mono',monospace;font-size:.68rem;padding:4px 9px;border-radius:16px;background:rgba(79,138,255,.1);color:#4f8aff;border:1px solid rgba(79,138,255,.2);}
.s-back{background:none;border:1px solid #252836;border-radius:7px;color:#6b7280;font-family:'DM Sans',sans-serif;font-size:.8rem;padding:5px 12px;cursor:pointer;transition:all .15s;white-space:nowrap;}
.s-back:hover{border-color:#e4e6ef;color:#e4e6ef;}
.s-nav{display:flex;gap:3px;}
.s-tab{background:none;border:none;color:#6b7280;font-family:'DM Sans',sans-serif;font-size:.82rem;font-weight:500;padding:7px 14px;border-radius:7px;cursor:pointer;transition:all .15s;white-space:nowrap;}
.s-tab:hover{background:#1c1f2c;color:#e4e6ef;}.s-tab.active{background:#4f8aff;color:#fff;}
.s-main{padding:1.5rem;max-width:1350px;margin:0 auto;}
.view{display:none;}.view.active{display:block;animation:fadeIn .2s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

/* … suite des styles SUIVI et modals… */
</style>
</head>

</div>

// ==== IMPORT EXCEL =====
function importExcel(file){
  const reader=new FileReader();
  reader.onload=e=>{
    const data=new Uint8Array(e.target.result);
    const workbook=XLSX.read(data,{type:'array'});
    const sheetName=workbook.SheetNames[0];
    const json=XLSX.utils.sheet_to_json(workbook.Sheets[sheetName]);
    json.forEach(row=>{
      // Ajouter chaque élève
      CTX.clsData=CTX.clsData||[];
      CTX.clsData.push({name:row['Nom'],aménagement:row['Aménagement'],note:null});
    });
    alert('Élèves importés : '+json.length);
  };
  reader.readAsArrayBuffer(file);
}
